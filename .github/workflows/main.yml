name: Demo-app-python  Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Image Tag
      run: echo "TAG=${{ github.run_number }}" >> $GITHUB_ENV

    - name: Build and Push Docker Image
      run: |
         docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ env.TAG }} ./app
         docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:latest ./app

          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ env.TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest

    
